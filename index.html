
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Data Center World Map - Perfect Version</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%); 
            color: white; overflow: hidden; height: 100vh;
        }
        #map { 
            width: 100vw; height: 100vh; 
            filter: drop-shadow(0 0 20px rgba(1,105,111,0.3));
        }
        .controls {
            position: absolute; top: 20px; left: 20px; z-index: 1000; display: flex; gap: 12px;
        }
        input {
            padding: 14px 20px; border: none; border-radius: 50px; background: rgba(255,255,255,0.1);
            color: white; font-size: 16px; backdrop-filter: blur(20px); width: 320px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        input::placeholder { color: rgba(255,255,255,0.6); }
        button {
            padding: 14px 28px; background: linear-gradient(135deg, #01696f, #017d7a); 
            border: none; border-radius: 50px; color: white; font-weight: 600; cursor: pointer;
            backdrop-filter: blur(20px); box-shadow: 0 8px 32px rgba(1,105,111,0.3);
            transition: all 0.3s ease;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(1,105,111,0.4); }
        .popup {
            position: fixed; top: 50%; left: 50%; width: 480px; max-height: 80vh;
            background: rgba(15,15,35,0.98); backdrop-filter: blur(40px);
            border-radius: 24px; transform: translate(-50%, -50%) scale(0);
            opacity: 0; z-index: 2000; border: 1px solid rgba(1,105,111,0.5);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); overflow: hidden;
            box-shadow: 0 32px 80px rgba(0,0,0,0.6);
        }
        .popup.show {
            transform: translate(-50%, -50%) scale(1); opacity: 1;
        }
        .popup-header {
            padding: 32px 32px 0; border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        .popup-title {
            font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #4fd1c7, #01696f);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 16px 0;
        }
        .close-btn {
            position: absolute; top: 24px; right: 32px; background: none; border: none;
            color: rgba(255,255,255,0.6); font-size: 28px; cursor: pointer; width: 40px; height: 40px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .close-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .popup-body {
            padding: 24px 32px 32px; max-height: 60vh; overflow-y: auto;
        }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin-bottom: 24px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 16px;
            border: 1px solid rgba(1,105,111,0.3); text-align: center;
        }
        .stat-label { font-size: 12px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .stat-value { font-size: 22px; font-weight: 700; color: white; }
        .detail-section { margin-bottom: 20px; }
        .detail-label { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 4px; font-weight: 500; }
        .detail-value { font-size: 16px; color: white; }
        ul { list-style: none; padding: 0; }
        ul li { padding: 8px 0; color: rgba(255,255,255,0.9); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .notes { font-style: italic; color: rgba(255,255,255,0.7); }
        @media (max-width: 600px) { .popup { width: 95vw; } input { width: 220px; } }
    </style>
</head>
<body>
    <div class="controls">
        <input id="searchInput" placeholder="Search by name or country..." />
        <button onclick="focusEurope()">🇪🇺 Europe</button>
    </div>
    <div id="map"></div>

    <div id="popup" class="popup">
        <div class="popup-header">
            <h1 id="popupTitle" class="popup-title"></h1>
            <button class="close-btn" onclick="closePopup()">×</button>
        </div>
        <div class="popup-body" id="popupBody"></div>
    </div>

    <script>
        const DATA = [
            {
                id: "g42-france", name: "G42 / DataOne AI Campus", country: "France", city: "Grenoble", status: "Under Construction",
                lat: 45.1885, lon: 5.7245, color: "#ff6b6b", size: 28,
                builder: "G42 + DataOne", owner: "DataOne / G42", cost: "€15 billion", capacity: "1.4 GW campus",
                timing: "Phased rollout from mid-2025", customers: ["French sovereign AI", "Mistral AI", "Enterprise AI"],
                notes: "Europe's largest announced AI campus. AMD Instinct accelerators."
            },
            {
                id: "nebius-finland", name: "Nebius Lappeenranta Gigafactory", country: "Finland", city: "Lappeenranta", status: "Planned",
                lat: 61.0587, lon: 28.1887, color: "#4ecdc4", size: 26,
                builder: "Nebius + Polarnode", owner: "Nebius Group", cost: "$10 billion", capacity: "310 MW",
                timing: "Online 2027", customers: ["Microsoft Azure", "Meta AI", "Open model training"],
                notes: "Hydro-powered. One of Europe's biggest AI facilities."
            },
            {
                id: "google-frankfurt", name: "Google Cloud Frankfurt (eu-west3)", country: "Germany", city: "Frankfurt", status: "Live",
                lat: 50.1109, lon: 8.6821, color: "#45b7d1", size: 24,
                builder: "Google", owner: "Google", cost: "Multi-billion €", capacity: "200+ MW",
                timing: "Fully operational", customers: ["Google Cloud AI/ML", "Enterprise workloads"],
                notes: "Carbon-free energy. Key AI training region."
            },
            {
                id: "stargate-norway", name: "Stargate Narvik AI Factory", country: "Norway", city: "Narvik", status: "Planned",
                lat: 68.4388, lon: 17.4279, color: "#96ceb4", size: 25,
                builder: "OpenAI + Nscale + Aker", owner: "Stargate consortium", cost: "Multi-billion $", capacity: "230 MW",
                timing: "Development phase", customers: ["OpenAI", "Partners"],
                notes: "100% hydro power. Strategic Arctic location."
            },
            {
                id: "xai-colossus", name: "xAI Colossus Memphis", country: "USA", city: "Memphis, TN", status: "Live + Expanding",
                lat: 35.1495, lon: -90.0490, color: "#feca57", size: 32,
                builder: "xAI", owner: "xAI", cost: "Multi-billion $", capacity: "100k+ H100 GPUs",
                timing: "2024-2026 ramp", customers: ["xAI Grok training"],
                notes: "World's largest single GPU cluster. Global benchmark."
            }
        ];

        let filteredData = DATA.slice();

        function renderMap() {
            const trace = {
                type: "scattergeo",
                lat: filteredData.map(d => d.lat),
                lon: filteredData.map(d => d.lon),
                mode: "markers",
                marker: {
                    size: filteredData.map(d => d.size),
                    color: filteredData.map(d => d.color),
                    line: {color: "white", width: 4},
                    opacity: 0.9
                },
                text: filteredData.map(d => d.name),
                hovertemplate: "<b>%{text}</b><br>%{lat:.2f}, %{lon:.2f}<extra></extra>",
                customdata: filteredData.map(d => d.id)
            };

            const layout = {
                title: {
                    text: "🧠 Global AI Data Centers 2026",
                    font: {size: 24, color: "white"},
                    x: 0.5, xanchor: "center"
                },
                geo: {
                    projection: {type: "natural earth"},
                    landcolor: "rgba(30,40,50,0.8)",
                    countrycolor: "rgba(60,70,90,0.8)",
                    coastlinecolor: "rgba(1,105,111,0.6)",
                    backgroundcolor: "transparent"
                },
                paper_bgcolor: "transparent",
                plot_bgcolor: "transparent",
                margin: {t: 60, b: 0, l: 0, r: 0}
            };

            Plotly.newPlot("map", [trace], layout, {
                responsive: true,
                displayModeBar: false,
                displaylogo: false
            });
        }

        // Map click handler
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("map").on("plotly_click", function(eventData) {
                const point = eventData.points[0];
                const facilityId = point.customdata;
                const facility = DATA.find(f => f.id === facilityId);

                if (facility) {
                    document.getElementById("popupTitle").textContent = facility.name;
                    document.getElementById("popupBody").innerHTML = `
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-label">Country</div>
                                <div class="stat-value">${facility.country}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Status</div>
                                <div class="stat-value">${facility.status}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Investment</div>
                                <div class="stat-value">${facility.cost}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Capacity</div>
                                <div class="stat-value">${facility.capacity}</div>
                            </div>
                        </div>
                        <div class="detail-section">
                            <div class="detail-label">Builder</div>
                            <div class="detail-value">${facility.builder}</div>
                        </div>
                        <div class="detail-section">
                            <div class="detail-label">Owner</div>
                            <div class="detail-value">${facility.owner}</div>
                        </div>
                        <div class="detail-section">
                            <div class="detail-label">Timeline</div>
                            <div class="detail-value">${facility.timing}</div>
                        </div>
                        <div class="detail-section">
                            <div class="detail-label">Key Customers</div>
                            <ul>${facility.customers.map(c => `<li>${c}</li>`).join("")}</ul>
                        </div>
                        <div class="detail-section">
                            <div class="detail-label">Notes</div>
                            <div class="notes">${facility.notes}</div>
                        </div>
                    `;
                    document.getElementById("popup").classList.add("show");
                }
            });
        });

        function closePopup() {
            document.getElementById("popup").classList.remove("show");
        }

        document.getElementById("searchInput").addEventListener("input", function(e) {
            const query = e.target.value.toLowerCase();
            filteredData = DATA.filter(item => 
                item.name.toLowerCase().includes(query) || 
                item.country.toLowerCase().includes(query)
            );
            renderMap();
        });

        function focusEurope() {
            filteredData = DATA.filter(item => item.country !== "USA");
            renderMap();
        }

        // Initial load
        renderMap();
    </script>
</body>
</html>
